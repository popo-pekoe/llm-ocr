<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DocuExtract</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <style>
        body { font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react,env">
        const { useState, useRef, useEffect } = React;
        
        const FaIcon = ({ name, size, className = "" }) => {
          const style = size ? { fontSize: `${size}px` } : {};
          return <i className={`fa-solid fa-${name} ${className}`} style={style}></i>;
        };

        const BACKUP_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbynshM5lmV62v-nGQMLhECcIj8_C-n1Mf-zcSbfHUhJkYdGP2nIdlaSwiRyfXOXWigP/exec"; 

        function App() {
          const [imageFiles, setImageFiles] = useState([]);
          const [currentFileIndex, setCurrentFileIndex] = useState(0);
          const [extractedDataList, setExtractedDataList] = useState([]);
          
          const [imageSrc, setImageSrc] = useState(null);
          const [loading, setLoading] = useState(false);
          const [isUploading, setIsUploading] = useState(false);
          const [isAnalyzingAll, setIsAnalyzingAll] = useState(false);
          const [analyzingIndex, setAnalyzingIndex] = useState(-1);
          const [error, setError] = useState(null);
          const [toastMessage, setToastMessage] = useState(null);
          
          const [thumbnails, setThumbnails] = useState([]);
          const [isPageSelectModalOpen, setIsPageSelectModalOpen] = useState(false);
          const [selectedPages, setSelectedPages] = useState([]);
          
          const [viewMode, setViewMode] = useState('split');
          const [panelOpacity, setPanelOpacity] = useState(0.8);
          const [panelPos, setPanelPos] = useState({ x: 40, y: 40 });
          const [isDragging, setIsDragging] = useState(false);
          const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

          const [panelSize, setPanelSize] = useState({ width: 600, height: 500 });
          const [columnWidths, setColumnWidths] = useState({
            name: 250, quantity: 80, unit: 80, unit_price: 100, price: 120, action: 50
          });
          const [resizeState, setResizeState] = useState(null);

          const [isExportMenuOpen, setIsExportMenuOpen] = useState(false);
          const exportMenuRef = useRef(null);

          const [userApiKey, setUserApiKey] = useState("");
          const [showSettings, setShowSettings] = useState(false);
          const [apiKeyInput, setApiKeyInput] = useState("");

          // ==========================================
          // 見積書作成エディタ用のステート群
          // ==========================================
          const [isQuoteEditorOpen, setIsQuoteEditorOpen] = useState(false);
          const [quoteSettings, setQuoteSettings] = useState({
            multiplier: 100,
            roundTarget: 1,
          });
          const [myCompany, setMyCompany] = useState({
            name: '', zip: '', address: '', tel: '', person: ''
          });
          const [quoteData, setQuoteData] = useState({
            recipient: '', honorific: '御中', project_name: '', project_address: '', date: '', items: []
          });

          const panelRef = useRef(null);
          const fileInputRef = useRef(null);

          const defaultData = {
            document_type: "", issuer: "", recipient: "", date: "", 
            project_name: "", project_address: "",
            total_amount: 0, items: [], isAnalyzed: false
          };

          const extractedData = extractedDataList[currentFileIndex] || defaultData;
          const hasAnalyzedData = extractedDataList.some(d => d.isAnalyzed);

          useEffect(() => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey && savedKey.trim() !== "") { 
              setUserApiKey(savedKey); 
              setApiKeyInput(savedKey); 
            } else {
              setShowSettings(true);
            }
            
            const savedCompany = localStorage.getItem('docuextract_my_company');
            if (savedCompany) {
              try { setMyCompany(JSON.parse(savedCompany)); } catch(e) {}
            }
          }, []);

          const saveApiKey = () => {
            if (apiKeyInput.trim() === "") {
              localStorage.removeItem('gemini_api_key');
              setUserApiKey("");
            } else {
              localStorage.setItem('gemini_api_key', apiKeyInput.trim());
              setUserApiKey(apiKeyInput.trim());
            }
            setShowSettings(false);
          };

          const handleMyCompanyChange = (field, value) => {
            setMyCompany(prev => {
              const next = { ...prev, [field]: value };
              localStorage.setItem('docuextract_my_company', JSON.stringify(next));
              return next;
            });
          };

          useEffect(() => {
            const urls = imageFiles.map(file => URL.createObjectURL(file));
            setThumbnails(urls);
            setSelectedPages(imageFiles.map(() => true));
            return () => urls.forEach(url => URL.revokeObjectURL(url));
          }, [imageFiles]);

          const getClientPos = (e) => {
            if (e.touches && e.touches.length > 0) return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
            else if (e.changedTouches && e.changedTouches.length > 0) return { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY };
            return { clientX: e.clientX, clientY: e.clientY };
          };

          useEffect(() => {
            const handleMouseMove = (e) => { 
              if (e.type === 'touchmove') e.preventDefault();
              onDrag(e); onResize(e); 
            };
            const handleMouseUp = () => { endDrag(); endResize(); };
            
            if (isDragging || resizeState) {
              window.addEventListener('mousemove', handleMouseMove);
              window.addEventListener('mouseup', handleMouseUp);
              window.addEventListener('touchmove', handleMouseMove, { passive: false });
              window.addEventListener('touchend', handleMouseUp);
            }
            return () => {
              window.removeEventListener('mousemove', handleMouseMove);
              window.removeEventListener('mouseup', handleMouseUp);
              window.removeEventListener('touchmove', handleMouseMove);
              window.removeEventListener('touchend', handleMouseUp);
            };
          }, [isDragging, resizeState]);

          useEffect(() => {
            const handleClickOutside = (event) => {
              if (exportMenuRef.current && !exportMenuRef.current.contains(event.target)) {
                setIsExportMenuOpen(false);
              }
            };
            document.addEventListener('mousedown', handleClickOutside);
            return () => document.removeEventListener('mousedown', handleClickOutside);
          }, []);

          const startDrag = (e) => {
            if (resizeState) return;
            if (e.target.tagName.toLowerCase() === 'input') return;
            setIsDragging(true);
            const pos = getClientPos(e);
            setDragOffset({ x: pos.clientX - panelPos.x, y: pos.clientY - panelPos.y });
          };
          const onDrag = (e) => {
            if (!isDragging) return;
            const pos = getClientPos(e);
            setPanelPos({ x: pos.clientX - dragOffset.x, y: pos.clientY - dragOffset.y });
          };
          const endDrag = () => setIsDragging(false);

          const startResize = (e, target) => {
            e.stopPropagation(); 
            const startWidth = target.startsWith('panel') ? panelSize.width : columnWidths[target];
            const startHeight = target.startsWith('panel') ? panelSize.height : 0;
            const pos = getClientPos(e);
            setResizeState({ target, startX: pos.clientX, startY: pos.clientY, startWidth, startHeight });
          };
          const onResize = (e) => {
            if (!resizeState) return;
            const { target, startX, startY, startWidth, startHeight } = resizeState;
            const pos = getClientPos(e);
            const deltaX = pos.clientX - startX; const deltaY = pos.clientY - startY;
            if (target.startsWith('panel')) {
              let newWidth = target.includes('e') ? Math.max(300, startWidth + deltaX) : startWidth;
              let newHeight = target.includes('s') ? Math.max(200, startHeight + deltaY) : startHeight;
              setPanelSize({ width: newWidth, height: newHeight });
            } else {
              setColumnWidths(prev => ({ ...prev, [target]: Math.max(50, startWidth + deltaX) }));
            }
          };
          const endResize = () => setResizeState(null);

          const loadPdfPagesAsImages = async (file) => {
            const pdfjsLib = window['pdfjs-dist/build/pdf'];
            if (!pdfjsLib) throw new Error("PDFライブラリが読み込まれていません");
            
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const numPages = pdf.numPages;
            const newFiles = [];

            for (let i = 1; i <= numPages; i++) {
              const page = await pdf.getPage(i);
              const viewport = page.getViewport({ scale: 2.0 });
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');
              canvas.width = viewport.width;
              canvas.height = viewport.height;
              
              await page.render({ canvasContext: ctx, viewport: viewport }).promise;
              const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
              
              const pageName = numPages > 1 ? `${file.name.replace('.pdf', '')}_P${i}.jpg` : `${file.name.replace('.pdf', '')}.jpg`;
              const newFile = new File([blob], pageName, { type: 'image/jpeg' });
              newFiles.push(newFile);
            }
            return newFiles;
          };

          const handleUploadBtnClick = () => {
            setIsUploading(true);
            setTimeout(() => {
              if (fileInputRef.current) fileInputRef.current.click();
              
              const handleFocus = () => {
                setTimeout(() => {
                  setIsUploading(false);
                }, 500); 
                window.removeEventListener('focus', handleFocus);
              };
              window.addEventListener('focus', handleFocus);
            }, 50);
          };

          const handleImageUpload = async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            setIsUploading(true);
            setLoading(true); 
            setError(null);
            
            await new Promise(resolve => setTimeout(resolve, 50));

            let processedFiles = [];
            for (const file of files) {
              if (file.type === 'application/pdf') {
                try {
                  setToastMessage(`${file.name} を画像に変換中...`);
                  const pdfImages = await loadPdfPagesAsImages(file);
                  processedFiles = processedFiles.concat(pdfImages);
                } catch (err) { setError(`PDFの読み込みに失敗しました: ${file.name}`); }
              } else if (file.type.startsWith('image/')) {
                processedFiles.push(file);
              }
            }

            if (processedFiles.length > 0) {
              setImageFiles(processedFiles);
              setExtractedDataList(processedFiles.map(() => ({ ...defaultData })));
              setCurrentFileIndex(0);
              setToastMessage(null);
            }
            
            setIsUploading(false);
            setLoading(false);
            if (fileInputRef.current) fileInputRef.current.value = '';
          };

          useEffect(() => {
            if (imageFiles.length > 0 && imageFiles[currentFileIndex]) {
              const reader = new FileReader();
              reader.onloadend = () => setImageSrc(reader.result);
              reader.readAsDataURL(imageFiles[currentFileIndex]);
            } else {
              setImageSrc(null);
            }
          }, [currentFileIndex, imageFiles]);

          const readFileAsBase64 = (file) => {
            return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => resolve(reader.result.split(',')[1]);
              reader.onerror = reject;
              reader.readAsDataURL(file);
            });
          };

          const analyzeImageCore = async (base64Data, mimeType, apiKey) => {
            const payload = {
              contents: [{
                role: "user",
                parts: [
                  { text: "この書類（見積書、請求書、領収書など）の画像を解析し、記載されている情報を抽出してください。特に明細（品名、数量、単価、金額など）がある場合はすべて抽出してください。\n※重要1：金額や数量が記載されていない『区分け』や『見出し』の行（例：「◆解体」「1, 1F和室」など）も絶対に省略せず、そのまま『品名(name)』に入れて1つの明細行として抽出してください。その場合、数量や単価、金額などの数値項目は 0 としてください。\n※重要2：明細の欄外や下部にある「注釈」「コメント」「備考」（例：「※振込手数料はご負担ください」「上記はお見積りとなります」など）も絶対に省略せず、それぞれ独立した1つの明細行として『品名(name)』に入れて抽出してください。その場合も、数量や単価、金額などの数値項目は 0 としてください。\n※重要3：明細欄の最後や途中に「小計」「消費税」「合計」「総合計」といった金額の集計行が含まれている場合がありますが、これらは明細リスト(items)には含めず、完全に無視・除外してください。純粋な個別の品目のみを抽出してください。\nまた、記載があれば「工事名（現場名）」と「現場住所」も抽出してください。ない場合は空欄で構いません。" },
                  { inlineData: { mimeType: mimeType, data: base64Data } }
                ]
              }],
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    document_type: { type: "STRING" }, issuer: { type: "STRING" }, recipient: { type: "STRING" },
                    date: { type: "STRING" }, project_name: { type: "STRING" }, project_address: { type: "STRING" },
                    total_amount: { type: "NUMBER" },
                    items: {
                      type: "ARRAY",
                      items: {
                        type: "OBJECT",
                        properties: {
                          name: { type: "STRING" }, quantity: { type: "NUMBER" }, unit: { type: "STRING" },
                          unit_price: { type: "NUMBER" }, price: { type: "NUMBER" }
                        }
                      }
                    }
                  }
                }
              }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            let retries = 5; let delay = 1000;

            while (retries > 0) {
              try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error(`APIエラー: ${response.status}`);
                const data = await response.json();
                const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (textResult) return JSON.parse(textResult);
                throw new Error("データの抽出に失敗しました。");
              } catch (err) {
                retries--;
                if (retries === 0) throw err;
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
              }
            }
          };

          const sendBackupToSpreadsheet = (fileName, parsedData) => {
            if (!BACKUP_WEBHOOK_URL) return; 
            try {
              const payload = {
                timestamp: new Date().toLocaleString('ja-JP'), fileName: fileName,
                document_type: parsedData.document_type || "", issuer: parsedData.issuer || "",
                recipient: parsedData.recipient || "", date: parsedData.date || "",
                project_name: parsedData.project_name || "", project_address: parsedData.project_address || "",
                total_amount: parsedData.total_amount || 0, items: JSON.stringify(parsedData.items || []) 
              };
              fetch(BACKUP_WEBHOOK_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            } catch (err) { console.error("バックアップ送信エラー:", err); }
          };

          const analyzeCurrentImage = async () => {
            if (!userApiKey) return setShowSettings(true);
            if (!imageSrc) return;
            setLoading(true); setError(null);
            
            try {
              const base64Data = imageSrc.split(',')[1];
              const mimeType = imageFiles[currentFileIndex].type;
              const parsedData = await analyzeImageCore(base64Data, mimeType, userApiKey);
              
              setExtractedDataList(prev => {
                const newList = [...prev];
                newList[currentFileIndex] = {
                  ...parsedData,
                  isAnalyzed: true
                };
                return newList;
              });
              sendBackupToSpreadsheet(imageFiles[currentFileIndex].name, parsedData);
            } catch(err) { setError(`解析エラー: ${err.message}`); } finally { setLoading(false); }
          };

          const openPageSelectModal = () => {
            setSelectedPages(imageFiles.map((_, idx) => !extractedDataList[idx]?.isAnalyzed));
            setIsPageSelectModalOpen(true);
          };

          const analyzeSelectedImages = async () => {
            setIsPageSelectModalOpen(false);
            if (!userApiKey) return setShowSettings(true);
            setIsAnalyzingAll(true); setError(null);
            let errorOccurred = false;

            for (let i = 0; i < imageFiles.length; i++) {
              if (!selectedPages[i]) continue; 
              setAnalyzingIndex(i); setCurrentFileIndex(i);

              try {
                const base64Data = await readFileAsBase64(imageFiles[i]);
                const mimeType = imageFiles[i].type;
                const parsedData = await analyzeImageCore(base64Data, mimeType, userApiKey);
                
                setExtractedDataList(prev => {
                  const newList = [...prev];
                  newList[i] = { ...parsedData, isAnalyzed: true };
                  return newList;
                });
                sendBackupToSpreadsheet(imageFiles[i].name, parsedData);
                await new Promise(resolve => setTimeout(resolve, 2000)); 
              } catch(err) {
                setError(`[${imageFiles[i].name}] の解析でエラーが発生したため、連続処理を中断しました: ${err.message}`);
                errorOccurred = true; break; 
              }
            }
            setIsAnalyzingAll(false); setAnalyzingIndex(-1);
            if (!errorOccurred && imageFiles.length > 0) {
               const nextUnanalyzed = extractedDataList.findIndex(d => !d.isAnalyzed);
               setCurrentFileIndex(nextUnanalyzed !== -1 ? nextUnanalyzed : 0);
            }
          };

          const handleInputChange = (field, value) => {
            setExtractedDataList(prev => {
              const newList = [...prev];
              newList[currentFileIndex] = { ...newList[currentFileIndex], [field]: value };
              return newList;
            });
          };

          const handleItemChange = (index, field, value) => {
            setExtractedDataList(prev => {
              const newList = [...prev];
              const newItems = [...newList[currentFileIndex].items];
              newItems[index] = { ...newItems[index], [field]: value };
              newList[currentFileIndex] = { ...newList[currentFileIndex], items: newItems };
              return newList;
            });
          };

          const addItem = () => {
            setExtractedDataList(prev => {
              const newList = [...prev];
              const currentItems = newList[currentFileIndex].items || [];
              newList[currentFileIndex] = { ...newList[currentFileIndex], items: [...currentItems, { name: "", quantity: 0, unit: "", unit_price: 0, price: 0 }] };
              return newList;
            });
          };

          const removeItem = (index) => {
            setExtractedDataList(prev => {
              const newList = [...prev];
              const newItems = [...newList[currentFileIndex].items];
              newItems.splice(index, 1);
              newList[currentFileIndex] = { ...newList[currentFileIndex], items: newItems };
              return newList;
            });
          };

          const dragItemIndex = useRef(null);
          const dragOverItemIndex = useRef(null);

          const handleRowDragStart = (e, index) => {
            dragItemIndex.current = index;
            e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => { if (e.target && e.target.classList) e.target.classList.add('opacity-50'); }, 0);
          };
          const handleRowDragEnter = (e, index) => { dragOverItemIndex.current = index; };
          const handleRowDragOver = (e) => e.preventDefault();
          const handleRowDragEnd = (e) => {
            if (e.target && e.target.classList) e.target.classList.remove('opacity-50');
            const dragIndex = dragItemIndex.current; const dropIndex = dragOverItemIndex.current;
            if (dragIndex !== null && dropIndex !== null && dragIndex !== dropIndex) {
              setExtractedDataList(prev => {
                const newList = [...prev];
                const newItems = [...newList[currentFileIndex].items];
                const draggedItem = newItems[dragIndex];
                newItems.splice(dragIndex, 1);
                newItems.splice(dropIndex, 0, draggedItem);
                newList[currentFileIndex] = { ...newList[currentFileIndex], items: newItems };
                return newList;
              });
            }
            dragItemIndex.current = null; dragOverItemIndex.current = null;
          };

          const openQuoteEditor = () => {
            const analyzedDataList = extractedDataList.filter(d => d.isAnalyzed);
            if (analyzedDataList.length === 0) {
              setError("解析済みのデータがありません。");
              return;
            }

            setQuoteSettings(prev => ({...prev, multiplier: 100}));

            const base = analyzedDataList[0];
            let allItems = [];
            analyzedDataList.forEach(data => {
              if (data.items && Array.isArray(data.items)) {
                allItems = allItems.concat(data.items);
              }
            });

            setQuoteData({
              recipient: base.issuer || base.recipient || '',
              honorific: '御中',
              project_name: base.project_name || '',
              project_address: base.project_address || '',
              date: new Date().toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '/'),
              items: allItems.map(item => ({
                ...item,
                base_unit_price: item.unit_price || 0,
                unit_price: item.unit_price || 0,
                price: (item.quantity || 0) * (item.unit_price || 0)
              }))
            });
            setIsQuoteEditorOpen(true);
          };

          const handleQuoteInputChange = (field, value) => {
            setQuoteData(prev => ({ ...prev, [field]: value }));
          };

          const handleQuoteItemChange = (index, field, value) => {
            setQuoteData(prev => {
              const newItems = [...prev.items];
              const updatedItem = { ...newItems[index], [field]: value };
              if (field === 'quantity' || field === 'unit_price') {
                updatedItem.price = (updatedItem.quantity || 0) * (updatedItem.unit_price || 0);
              }
              if (field === 'unit_price') {
                updatedItem.base_unit_price = value;
              }
              newItems[index] = updatedItem;
              return { ...prev, items: newItems };
            });
          };

          const applyQuoteSettings = () => {
            setQuoteData(prev => {
              const newItems = prev.items.map(item => {
                if (item.quantity === 0 && item.base_unit_price === 0 && item.price === 0) return item;
                let calcPrice = item.base_unit_price * (quoteSettings.multiplier / 100);
                const target = quoteSettings.roundTarget;
                if (target > 0) calcPrice = Math.ceil(calcPrice / target) * target;
                return { ...item, unit_price: calcPrice, price: calcPrice * (item.quantity || 0) };
              });
              return { ...prev, items: newItems };
            });
            setToastMessage("単価を再計算し、金額を更新しました。");
            setTimeout(() => setToastMessage(null), 3000);
          };

          const addQuoteItem = () => {
            setQuoteData(prev => ({
              ...prev, items: [...prev.items, { name: "", quantity: 0, unit: "", unit_price: 0, base_unit_price: 0, price: 0 }]
            }));
          };

          const removeQuoteItem = (index) => {
            setQuoteData(prev => {
              const newItems = [...prev.items];
              newItems.splice(index, 1);
              return { ...prev, items: newItems };
            });
          };

          const dragQuoteItemIndex = useRef(null);
          const dragOverQuoteItemIndex = useRef(null);
          const handleQuoteRowDragStart = (e, index) => {
            dragQuoteItemIndex.current = index; e.dataTransfer.effectAllowed = 'move';
            setTimeout(() => { if (e.target && e.target.classList) e.target.classList.add('opacity-50'); }, 0);
          };
          const handleQuoteRowDragEnter = (e, index) => { dragOverQuoteItemIndex.current = index; };
          const handleQuoteRowDragOver = (e) => e.preventDefault();
          const handleQuoteRowDragEnd = (e) => {

          // ==========================================

          const generateCSVContent = () => { 
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);

            extractedDataList.forEach((data, index) => {
              const fileName = imageFiles[index] ? imageFiles[index].name : `file_${index+1}`;

              const docType = escapeCSV(data.document_type); const date = escapeCSV(data.date);
              const recipient = escapeCSV(data.recipient); const issuer = escapeCSV(data.issuer);
              const projectName = escapeCSV(data.project_name); const projectAddress = escapeCSV(data.project_address);
              const total = data.total_amount || 0;
              const baseRow = `"${fileName}","${docType}","${date}","${recipient}","${issuer}","${projectName}","${projectAddress}",${total}`;
              if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                  const name = escapeCSV(item.name); const unit = escapeCSV(item.unit);
                  csvContent += `${baseRow},"${name}",${item.quantity || 0},"${unit}",${item.unit_price || 0},${item.price || 0}\n`;
                });
              } else { csvContent += `${baseRow},"","",0,"",0,0\n`; }
            });
            return { bom, csvContent };
          };

          const generateTSVContent = () => { 
            let tsvContent = "ファイル名\t書類種別\t発行日\t宛先\t発行元\t工事名\t現場住所\t合計金額\t品名\t数量\t単位\t単価\t金額\n";
            extractedDataList.forEach((data, index) => {
              const fileName = imageFiles[index] ? imageFiles[index].name : `file_${index+1}`;
              const escapeTSV = (str) => String(str || '').replace(/\t/g, ' ').replace(/\n/g, ' ');
              const docType = escapeTSV(data.document_type); const date = escapeTSV(data.date);
              const recipient = escapeTSV(data.recipient); const issuer = escapeTSV(data.issuer);
              const projectName = escapeTSV(data.project_name); const projectAddress = escapeTSV(data.project_address);
              const total = data.total_amount || 0;
              const baseRow = `${fileName}\t${docType}\t${date}\t${recipient}\t${issuer}\t${projectName}\t${projectAddress}\t${total}`;
              if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                  const name = escapeTSV(item.name); const unit = escapeTSV(item.unit);
                  tsvContent += `${baseRow}\t${name}\t${item.quantity || 0}\t${unit}\t${item.unit_price || 0}\t${item.price || 0}\n`;
                });

            });
            return tsvContent;

            const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", "extracted_documents_all.json"); document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();
          };

          const exportCSV = () => {

            const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", url); downloadAnchorNode.setAttribute("download", "extracted_documents_all.csv"); document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();

            extractedDataList.forEach((data, index) => {
              const fileName = imageFiles[index] ? imageFiles[index].name : `file_${index+1}`;
              const baseRow = [fileName, data.document_type || "", data.date || "", data.recipient || "", data.issuer || "", data.project_name || "", data.project_address || "", data.total_amount || 0];
              if (data.items && data.items.length > 0) {
                data.items.forEach(item => { aoa.push([...baseRow, item.name || "", item.quantity || 0, item.unit || "", item.unit_price || 0, item.price || 0]); });
              } else { aoa.push([...baseRow, "", 0, "", 0, 0]); }

            const worksheet = XLSX.utils.aoa_to_sheet(aoa); const workbook = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(workbook, worksheet, "抽出データ"); XLSX.writeFile(workbook, "extracted_documents_all.xlsx");

                </div>

                <div className="mt-8">

                          <th className="p-1 w-6 text-center"></th>
                          {renderResizableHeader('品名', 'name')}
                          {renderResizableHeader('数量', 'quantity')}
                          {renderResizableHeader('単位', 'unit')}
                          {renderResizableHeader('単価', 'unit_price')}

                            <td className="p-1"><input type="number" value={item.quantity} onChange={(e) => handleItemChange(index, 'quantity', Number(e.target.value))} className={`${tableInputClass} text-right`} /></td>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                      <div className="p-3 border-b border-gray-200 bg-gray-50 font-semibold text-gray-700 flex items-center gap-2"><FaIcon name="image" size={16} /> 元データ</div>
                      <div className="flex-grow p-4 overflow-auto bg-gray-100 flex justify-center">{imageSrc ? <img src={imageSrc} className="max-w-full h-auto object-contain" /> : <p className="text-gray-400 mt-10">ファイルがありません</p>}</div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                      <div className="p-3 border-b border-gray-200 bg-gray-50 font-semibold text-gray-700 flex items-center gap-2"><FaIcon name="file-excel" size={16} /> 抽出データ</div>
                      {renderFormContent(false)}
                    </div>
                  </div>
                ) : (
                  <div className="relative w-full h-[calc(100vh-16rem)] min-h-[700px] border border-gray-300 rounded-xl overflow-hidden bg-gray-200 shadow-inner">
                    <div className="w-full h-full overflow-auto p-4 md:p-8">{imageSrc ? <img src={imageSrc} className="min-w-[800px] w-full h-auto shadow-md" /> : <div className="flex justify-center items-center h-full text-gray-400"><p>ファイルを選択してください</p></div>}</div>
                    <div ref={panelRef} style={{ left: panelPos.x, top: panelPos.y, width: panelSize.width, height: panelSize.height, backgroundColor: `rgba(255, 255, 255, ${panelOpacity})`, backdropFilter: 'blur(4px)' }} className={`absolute shadow-2xl rounded-xl flex flex-col border border-gray-300/50 transition-opacity ${isDragging ? 'opacity-90' : ''} ${resizeState ? '' : 'transition-all'}`}>
                      <div onMouseDown={startDrag} onTouchStart={startDrag} className="cursor-move p-3 border-b border-gray-300/30 flex justify-between items-center bg-gray-200/50 rounded-t-xl hover:bg-gray-200/80">
                        <div className="flex items-center gap-2 font-bold text-gray-800"><FaIcon name="grip-lines" size={16} className="text-gray-500" /> データ編集パネル</div>
                        <div className="flex items-center gap-3 text-sm font-medium bg-white/50 px-3 py-1 rounded-full shadow-sm" onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()}>
                          <span className="text-gray-700">透明度</span><input type="range" min="0.1" max="1" step="0.05" value={panelOpacity} onChange={e=>setPanelOpacity(parseFloat(e.target.value))} className="w-24 accent-blue-600" />
                        </div>
                      </div>
                      <div className="flex-grow overflow-y-auto relative">{renderFormContent(true)}</div>
                      <div className="absolute right-0 bottom-0 w-4 h-4 cursor-se-resize z-20" onMouseDown={(e)=>startResize(e,'panel-se')} onTouchStart={(e)=>startResize(e,'panel-se')}></div>
                    </div>
                  </div>
                )}
              </div>

              {/* ★見積書作成フルスクリーンエディター */}
              {isQuoteEditorOpen && (
                <div className="fixed inset-0 bg-gray-100 z-[60] flex flex-col overflow-hidden animate-fade-in">
                  <div className="bg-white px-6 py-3 border-b border-gray-200 flex justify-between items-center shadow-sm">
                    <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                      <FaIcon name="file-invoice" className="text-indigo-600"/> 御見積書の作成
                    </h2>
                    <div className="flex gap-2">
                        <button onClick={exportQuoteExcel} className="flex items-center gap-2 px-3 py-1.5 bg-green-600 text-white rounded-lg hover:bg-green-700 font-bold shadow-sm text-sm">
                          <FaIcon name="file-excel"/> Excel形式で保存 (.xls)
                        </button>
                        <button onClick={copyQuoteTSVToClipboard} className="flex items-center gap-2 px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-sm text-sm">
                          <FaIcon name="copy"/> 全体をTSVコピー
                        </button>
                        <button onClick={printQuotePDF} className="flex items-center gap-2 px-4 py-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-bold shadow-sm text-sm">
                          <FaIcon name="file-pdf"/> PDF発行(印刷)
                        </button>
                        <div className="w-px bg-gray-300 mx-1"></div>
                        <button onClick={() => setIsQuoteEditorOpen(false)} className="flex items-center gap-2 px-3 py-1.5 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-bold text-sm">
                          <FaIcon name="xmark"/> 閉じる
                        </button>
                    </div>
                  </div>

                  <div className="flex-grow overflow-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                    {/* 左サイドバー */}
                    <div className="lg:col-span-3 space-y-6">
                       <div className="bg-white p-5 rounded-xl shadow-sm border border-indigo-100 relative overflow-hidden">
                         <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                         <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2"><FaIcon name="calculator" className="text-indigo-500" /> 金額計算設定</h3>
                         <div className="space-y-4">
                           <div>
                             <label className="block text-xs font-bold text-gray-500 mb-1">掛率 (%)</label>
                             <div className="relative">
                               <input type="number" step="1" value={quoteSettings.multiplier} onChange={e => setQuoteSettings(prev => ({...prev, multiplier: Number(e.target.value)}))} className="w-full p-2 pr-8 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none text-right font-bold text-lg" />
                               <span className="absolute right-3 top-2.5 font-bold text-gray-400">%</span>
                             </div>
                             <p className="text-[10px] text-gray-400 mt-1">※100で元の単価、120で2割増しになります</p>
                           </div>
                           <div>
                             <label className="block text-xs font-bold text-gray-500 mb-1">丸め処理 (切り上げ単位)</label>
                             <select value={quoteSettings.roundTarget} onChange={e => setQuoteSettings(prev => ({...prev, roundTarget: Number(e.target.value)}))} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none font-medium bg-gray-50">
                               <option value={1}>小数点以下切り上げ (整数化)</option>
                               <option value={10}>10円単位切り上げ (1の位)</option>
                               <option value={100}>100円単位切り上げ (10の位)</option>
                               <option value={1000}>1,000円単位切り上げ (100の位)</option>
                               <option value={0}>丸めない (そのまま)</option>
                             </select>
                           </div>
                           <button onClick={applyQuoteSettings} className="w-full py-2 bg-indigo-50 text-indigo-700 border border-indigo-200 rounded-lg font-bold hover:bg-indigo-100 transition-colors flex items-center justify-center gap-2">
                             <FaIcon name="rotate" /> 単価を再計算する
                           </button>
                         </div>
                       </div>

                       <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                         <h3 className="font-bold text-gray-800 mb-4 flex items-center gap-2"><FaIcon name="pen-to-square" className="text-gray-500" /> 見積基本情報</h3>
                         <div className="space-y-3">
                           <div>
                             <label className="block text-xs font-bold text-gray-500 mb-1">宛名 (お客様名)</label>
                             <div className="flex gap-2">
                               <input type="text" value={quoteData.recipient} onChange={e => handleQuoteInputChange('recipient', e.target.value)} className="w-full p-2 border border-gray-300 rounded outline-none" />
                               <select value={quoteData.honorific} onChange={e => handleQuoteInputChange('honorific', e.target.value)} className="p-2 border border-gray-300 rounded outline-none bg-white w-24">
                                 <option value="御中">御中</option>
                                 <option value="様">様</option>
                                 <option value="">なし</option>
                               </select>
                             </div>
                           </div>
                           <div><label className="block text-xs font-bold text-gray-500 mb-1">工事名・件名</label><input type="text" value={quoteData.project_name} onChange={e => handleQuoteInputChange('project_name', e.target.value)} className="w-full p-2 border border-gray-300 rounded outline-none" /></div>
                           <div><label className="block text-xs font-bold text-gray-500 mb-1">現場住所</label><input type="text" value={quoteData.project_address} onChange={e => handleQuoteInputChange('project_address', e.target.value)} className="w-full p-2 border border-gray-300 rounded outline-none" /></div>
                           <div><label className="block text-xs font-bold text-gray-500 mb-1">発行日</label><input type="text" value={quoteData.date} onChange={e => handleQuoteInputChange('date', e.target.value)} className="w-full p-2 border border-gray-300 rounded outline-none" /></div>
                           <p className="text-[10px] text-gray-400 mt-2">※見積有効期限は「発行日より30日間」として印字されます。</p>
                         </div>
                       </div>

                       <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                         <div className="flex justify-between items-center mb-4">
                           <h3 className="font-bold text-gray-800 flex items-center gap-2"><FaIcon name="building" className="text-gray-500" /> 自社情報</h3>
                           <span className="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded">自動保存</span>
                         </div>
                         <div className="space-y-3">
                           <div><label className="block text-xs font-bold text-gray-500 mb-1">会社名 / 屋号</label><input type="text" value={myCompany.name} onChange={e => handleMyCompanyChange('name', e.target.value)} className="w-full p-2 border border-gray-300 rounded outline-none" /></div>
                           <div className="flex gap-2">
                             <div className="w-1/3"><label className="block text-xs font-bold text-gray-500 mb-1">郵便番号</label><input type="text" value={myCompany.zip} onChange={e => handleMyCompanyChange('zip', e.target.value)} className="w-full p-2 border border-gray-300 rounded outline-none" placeholder="000-0000" /></div>
                             <div className="w-2/3"><label className="block text-xs font-bold text-gray-500 mb-1">住所</label><input type="text" value={myCompany.address} onChange={e => handleMyCompanyChange('address', e.target.value)} className="w-full p-2 border border-gray-300 rounded outline-none" /></div>
                           </div>
                           <div><label className="block text-xs font-bold text-gray-500 mb-1">電話番号</label><input type="text" value={myCompany.tel} onChange={e => handleMyCompanyChange('tel', e.target.value)} className="w-full p-2 border border-gray-300 rounded outline-none" /></div>
                           <div><label className="block text-xs font-bold text-gray-500 mb-1">担当者名</label><input type="text" value={myCompany.person} onChange={e => handleMyCompanyChange('person', e.target.value)} className="w-full p-2 border border-gray-300 rounded outline-none" /></div>
                         </div>
                       </div>
                    </div>

                    {/* 右メイン: 明細エディタ */}
                    <div className="lg:col-span-9 bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-200">
                       <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 border-b border-gray-200 pb-4 gap-4">
                         <div>
                           <h3 className="text-lg font-bold text-gray-800">御見積明細</h3>
                           <p className="text-sm text-gray-500 mt-1">※ドラッグ＆ドロップで行の入れ替えが可能です</p>
                         </div>
                         <div className="flex items-center gap-6">
                           <div className="flex gap-4 text-right">
                             <div>
                               <div className="text-[10px] font-bold text-gray-500 mb-0.5">小計 (税抜)</div>
                               <div className="text-sm font-bold text-gray-600">¥ {quoteTotalAmount.toLocaleString()}</div>
                             </div>
                             <div>
                               <div className="text-[10px] font-bold text-gray-500 mb-0.5">消費税 (10%)</div>
                               <div className="text-sm font-bold text-gray-600">¥ {quoteTaxAmount.toLocaleString()}</div>
                             </div>
                             <div>
                               <div className="text-xs font-bold text-indigo-500 mb-0.5">御見積合計 (税込)</div>
                               <div className="text-xl font-bold text-indigo-700 tracking-wider">¥ {quoteGrandTotal.toLocaleString()} <span className="text-sm">-</span></div>
                             </div>
                           </div>
                           <button onClick={addQuoteItem} className="flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 hover:bg-gray-200 rounded-lg font-bold transition-colors">
                             <FaIcon name="plus" /> 行追加
                           </button>
                         </div>
                       </div>

                       <div className="overflow-x-auto rounded-lg border border-gray-200">
                         <table className="w-full text-sm text-left table-fixed">
                           <thead className="bg-gray-50 border-b border-gray-200 text-gray-600">
                             <tr>
                               <th className="p-2 w-10 text-center"></th>
                               <th className="p-3 font-bold" style={{width: '35%'}}>品名・仕様</th>
                               <th className="p-3 font-bold text-right" style={{width: '10%'}}>数量</th>
                               <th className="p-3 font-bold text-center" style={{width: '10%'}}>単位</th>
                               <th className="p-3 font-bold text-right" style={{width: '18%'}}>単価</th>
                               <th className="p-3 font-bold text-right" style={{width: '18%'}}>金額</th>
                               <th className="p-2 w-12 text-center"></th>
                             </tr>
                           </thead>
                           <tbody className="divide-y divide-gray-100">
                             {quoteData.items.map((item, index) => (
                               <tr key={index} draggable={true} onDragStart={(e) => { if (e.target.tagName.toLowerCase() === 'input') { e.preventDefault(); return; } handleQuoteRowDragStart(e, index); }} onDragEnter={(e) => handleQuoteRowDragEnter(e, index)} onDragEnd={handleQuoteRowDragEnd} onDragOver={handleQuoteRowDragOver} className="hover:bg-indigo-50/30 transition-colors">
                                 <td className="p-2 text-center cursor-move text-gray-300 hover:text-indigo-500"><FaIcon name="grip-vertical" size={16} /></td>
                                 <td className="p-1"><input type="text" value={item.name} onChange={(e) => handleQuoteItemChange(index, 'name', e.target.value)} className="w-full p-2 border border-transparent hover:border-gray-200 focus:bg-white focus:border-indigo-400 rounded outline-none font-medium bg-transparent" /></td>
                                 <td className="p-1"><input type="number" value={item.quantity} onChange={(e) => handleQuoteItemChange(index, 'quantity', Number(e.target.value))} className="w-full p-2 border border-transparent hover:border-gray-200 focus:bg-white focus:border-indigo-400 rounded outline-none text-right bg-transparent" /></td>
                                 <td className="p-1"><input type="text" value={item.unit} onChange={(e) => handleQuoteItemChange(index, 'unit', e.target.value)} className="w-full p-2 border border-transparent hover:border-gray-200 focus:bg-white focus:border-indigo-400 rounded outline-none text-center bg-transparent" /></td>
                                 <td className="p-1 relative group">
                                   <input type="number" value={item.unit_price} onChange={(e) => handleQuoteItemChange(index, 'unit_price', Number(e.target.value))} className="w-full p-2 border border-transparent hover:border-gray-200 focus:bg-white focus:border-indigo-400 rounded outline-none text-right font-medium bg-transparent" />
                                   <div className="absolute -bottom-1 right-2 text-[10px] text-gray-400 pointer-events-none group-focus-within:opacity-0 transition-opacity">元: {item.base_unit_price}</div>
                                 </td>
                                 <td className="p-1"><input type="number" value={item.price} readOnly className="w-full p-2 border border-transparent rounded outline-none text-right font-bold text-indigo-800 bg-transparent" /></td>
                                 <td className="p-1 text-center"><button onClick={() => removeQuoteItem(index)} className="p-2 text-red-400 hover:bg-red-50 hover:text-red-600 rounded-lg"><FaIcon name="trash" size={14} /></button></td>
                               </tr>
                             ))}
                           </tbody>
                         </table>
                       </div>
                    </div>
                  </div>
                </div>
              )}

              {/* 以下ページ選択モーダル */}
              {isPageSelectModalOpen && (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden">
                    <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                      <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2"><FaIcon name="list-check" className="text-blue-600" />処理するページを選択</h2>
                      <button onClick={() => setIsPageSelectModalOpen(false)} className="text-gray-500 hover:text-gray-700"><FaIcon name="xmark" size={20} /></button>
                    </div>
                    <div className="p-4 border-b border-gray-100 flex justify-between items-center">
                      <div className="text-sm font-medium text-gray-700 bg-blue-50 text-blue-800 px-3 py-1 rounded-full">{selectedPages.filter(Boolean).length} / {imageFiles.length} ページを選択中</div>
                      <div className="flex gap-2">
                         <button onClick={() => setSelectedPages(imageFiles.map(() => true))} className="text-sm font-medium text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded border border-transparent">すべて選択</button>
                         <button onClick={() => setSelectedPages(imageFiles.map(() => false))} className="text-sm font-medium text-gray-600 hover:bg-gray-100 px-3 py-1.5 rounded border border-transparent">すべて解除</button>
                      </div>
                    </div>
                    <div className="flex-grow overflow-y-auto p-4 bg-gray-100">
                      <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                        {imageFiles.map((file, index) => {
                          const isSelected = selectedPages[index]; const isAnalyzed = extractedDataList[index]?.isAnalyzed;
                          return (
                            <div key={index} className={`relative rounded-lg border-2 overflow-hidden cursor-pointer bg-white transition-all hover:shadow-md ${isSelected ? 'border-blue-500 shadow-md' : 'border-transparent opacity-70 hover:opacity-100'}`} onClick={() => { const newSelected = [...selectedPages]; newSelected[index] = !newSelected[index]; setSelectedPages(newSelected); }}>
                              <div className="aspect-[3/4] bg-gray-200 w-full relative flex items-center justify-center p-1">
                                 <img src={thumbnails[index]} className="max-w-full max-h-full object-contain shadow-sm bg-white" />
                                 {isAnalyzed && <div className="absolute top-1 left-1 bg-green-100 text-green-800 text-[10px] font-bold px-1.5 py-0.5 rounded border border-green-200 shadow-sm">解析済み</div>}
                              </div>
                              <div className="p-2 text-xs truncate bg-gray-50 border-t border-gray-100 font-medium" title={file.name}>{index + 1}. {file.name}</div>
                              <div className="absolute top-2 right-2 shadow-sm rounded-full bg-white"><div className={`w-5 h-5 rounded-full flex items-center justify-center border ${isSelected ? 'bg-blue-500 border-blue-500 text-white' : 'bg-white/80 border-gray-400 text-transparent'}`}><FaIcon name="check" size={12} /></div></div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    <div className="p-4 border-t border-gray-200 flex justify-end gap-3 bg-gray-50">
                      <button onClick={() => setIsPageSelectModalOpen(false)} className="px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">キャンセル</button>
                      <button onClick={analyzeSelectedImages} disabled={selectedPages.filter(Boolean).length === 0} className="flex items-center gap-2 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 font-bold shadow-sm"><FaIcon name="play" size={14} />選択したページを一括処理</button>
                    </div>
                  </div>
                </div>
              )}

              {showSettings && (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden">
                    <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                      <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2"><FaIcon name="key" className="text-blue-600" size={20} />Gemini API設定</h2>
                      <button onClick={() => setShowSettings(false)} className="text-gray-500 hover:text-gray-700"><FaIcon name="xmark" size={20} /></button>
                    </div>
                    <div className="p-6">
                      <p className="text-sm text-gray-600 mb-4">Google AI Studioで取得したAPIキーを入力してください。</p>
                      <div className="mb-4"><input type="password" value={apiKeyInput} onChange={(e) => setApiKeyInput(e.target.value)} placeholder="AIzaSy..." className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" /></div>
                      <div className="flex justify-end gap-2 mt-6">
                        <button onClick={() => setShowSettings(false)} className="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">キャンセル</button>
                        <button onClick={saveApiKey} className="px-4 py-2 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700">保存して閉じる</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
