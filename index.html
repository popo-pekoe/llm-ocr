<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DocuExtract</title>
    
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SheetJS (Excel出力用) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- React本体 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react,env">
        const { useState, useRef, useEffect } = React;
        
        const FaIcon = ({ name, size, className = "" }) => {
          const style = size ? { fontSize: `${size}px` } : {};
          return <i className={`fa-solid fa-${name} ${className}`} style={style}></i>;
        };

        function App() {
          // --- 複数ファイル対応の状態管理 ---
          const [imageFiles, setImageFiles] = useState([]);
          const [currentFileIndex, setCurrentFileIndex] = useState(0);
          const [extractedDataList, setExtractedDataList] = useState([]);
          
          const [imageSrc, setImageSrc] = useState(null);
          const [loading, setLoading] = useState(false);
          const [isAnalyzingAll, setIsAnalyzingAll] = useState(false);
          const [analyzingIndex, setAnalyzingIndex] = useState(-1);
          const [error, setError] = useState(null);
          const [toastMessage, setToastMessage] = useState(null); // トースト通知用
          
          // UI状態
          const [viewMode, setViewMode] = useState('split');
          const [panelOpacity, setPanelOpacity] = useState(0.8);
          const [panelPos, setPanelPos] = useState({ x: 40, y: 40 });
          const [isDragging, setIsDragging] = useState(false);
          const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

          const [panelSize, setPanelSize] = useState({ width: 600, height: 500 });
          const [columnWidths, setColumnWidths] = useState({
            name: 250, quantity: 80, unit: 80, unit_price: 100, price: 120, action: 50
          });
          const [resizeState, setResizeState] = useState(null);

          // エクスポートメニュー状態
          const [isExportMenuOpen, setIsExportMenuOpen] = useState(false);
          const exportMenuRef = useRef(null);

          // APIキー管理
          const [userApiKey, setUserApiKey] = useState("");
          const [showSettings, setShowSettings] = useState(false);
          const [apiKeyInput, setApiKeyInput] = useState("");

          const panelRef = useRef(null);
          const fileInputRef = useRef(null);

          // デフォルトの空データ構造
          const defaultData = {
            document_type: "", issuer: "", recipient: "", date: "", total_amount: 0, items: [], isAnalyzed: false
          };

          // 現在表示中のデータ（エイリアス）
          const extractedData = extractedDataList[currentFileIndex] || defaultData;

          useEffect(() => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
              setUserApiKey(savedKey);
              setApiKeyInput(savedKey);
            } else {
              setShowSettings(true);
            }
          }, []);

          const saveApiKey = () => {
            if (apiKeyInput.trim() === "") {
              localStorage.removeItem('gemini_api_key');
              setUserApiKey("");
            } else {
              localStorage.setItem('gemini_api_key', apiKeyInput.trim());
              setUserApiKey(apiKeyInput.trim());
            }
            setShowSettings(false);
          };

          useEffect(() => {
            const handleMouseMove = (e) => { onDrag(e); onResize(e); };
            const handleMouseUp = () => { endDrag(); endResize(); };
            if (isDragging || resizeState) {
              window.addEventListener('mousemove', handleMouseMove);
              window.addEventListener('mouseup', handleMouseUp);
            }
            return () => {
              window.removeEventListener('mousemove', handleMouseMove);
              window.removeEventListener('mouseup', handleMouseUp);
            };
          }, [isDragging, resizeState]);

          // プルダウンメニューの外側クリックで閉じる処理
          useEffect(() => {
            const handleClickOutside = (event) => {
              if (exportMenuRef.current && !exportMenuRef.current.contains(event.target)) {
                setIsExportMenuOpen(false);
              }
            };
            document.addEventListener('mousedown', handleClickOutside);
            return () => {
              document.removeEventListener('mousedown', handleClickOutside);
            };
          }, []);

          // --- ドラッグ & リサイズ ---
          const startDrag = (e) => {
            if (resizeState) return;
            if (e.target.tagName.toLowerCase() === 'input') return;
            setIsDragging(true);
            setDragOffset({ x: e.clientX - panelPos.x, y: e.clientY - panelPos.y });
          };
          const onDrag = (e) => {
            if (!isDragging) return;
            setPanelPos({ x: e.clientX - dragOffset.x, y: e.clientY - dragOffset.y });
          };
          const endDrag = () => setIsDragging(false);

          const startResize = (e, target) => {
            e.stopPropagation(); e.preventDefault();
            const startWidth = target.startsWith('panel') ? panelSize.width : columnWidths[target];
            const startHeight = target.startsWith('panel') ? panelSize.height : 0;
            setResizeState({ target, startX: e.clientX, startY: e.clientY, startWidth, startHeight });
          };
          const onResize = (e) => {
            if (!resizeState) return;
            const { target, startX, startY, startWidth, startHeight } = resizeState;
            const deltaX = e.clientX - startX; const deltaY = e.clientY - startY;
            if (target.startsWith('panel')) {
              let newWidth = target.includes('e') ? Math.max(300, startWidth + deltaX) : startWidth;
              let newHeight = target.includes('s') ? Math.max(200, startHeight + deltaY) : startHeight;
              setPanelSize({ width: newWidth, height: newHeight });
            } else {
              setColumnWidths(prev => ({ ...prev, [target]: Math.max(50, startWidth + deltaX) }));
            }
          };
          const endResize = () => setResizeState(null);
          // ----------------------------------------

          // --- 複数ファイルアップロードと表示切替 ---
          const handleImageUpload = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
              setImageFiles(files);
              setExtractedDataList(files.map(() => ({ ...defaultData })));
              setCurrentFileIndex(0);
              setError(null);
            }
            // 同じファイルを再度選べるようにリセット
            if (fileInputRef.current) fileInputRef.current.value = '';
          };

          // インデックスが切り替わったら画像プレビューを更新
          useEffect(() => {
            if (imageFiles.length > 0 && imageFiles[currentFileIndex]) {
              const reader = new FileReader();
              reader.onloadend = () => setImageSrc(reader.result);
              reader.readAsDataURL(imageFiles[currentFileIndex]);
            } else {
              setImageSrc(null);
            }
          }, [currentFileIndex, imageFiles]);

          // --- API通信コアロジック ---
          const analyzeImageCore = async (base64Data, mimeType, apiKey) => {
            const payload = {
              contents: [{
                role: "user",
                parts: [
                  { text: "この書類（見積書、請求書、領収書など）の画像を解析し、記載されている情報を抽出してください。特に明細（品名、数量、単価、金額など）がある場合はすべて抽出してください。" },
                  { inlineData: { mimeType: mimeType, data: base64Data } }
                ]
              }],
              generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                  type: "OBJECT",
                  properties: {
                    document_type: { type: "STRING" }, issuer: { type: "STRING" }, recipient: { type: "STRING" },
                    date: { type: "STRING" }, total_amount: { type: "NUMBER" },
                    items: {
                      type: "ARRAY",
                      items: {
                        type: "OBJECT",
                        properties: {
                          name: { type: "STRING" }, quantity: { type: "NUMBER" }, unit: { type: "STRING" },
                          unit_price: { type: "NUMBER" }, price: { type: "NUMBER" }
                        }
                      }
                    }
                  }
                }
              }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            let retries = 5; let delay = 1000;

            while (retries > 0) {
              try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!response.ok) throw new Error(`APIエラー: ${response.status}`);
                const data = await response.json();
                const textResult = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (textResult) return JSON.parse(textResult);
                throw new Error("データの抽出に失敗しました。");
              } catch (err) {
                retries--;
                if (retries === 0) throw err;
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
              }
            }
          };

          // 1件解析 (現在表示中の画像)
          const analyzeCurrentImage = async () => {
            if (!userApiKey) return setShowSettings(true);
            if (!imageSrc) return;

            setLoading(true); setError(null);
            
            try {
              const base64Data = imageSrc.split(',')[1];
              const mimeType = imageFiles[currentFileIndex].type;
              const parsedData = await analyzeImageCore(base64Data, mimeType, userApiKey);
              
              setExtractedDataList(prev => {
                const newList = [...prev];
                newList[currentFileIndex] = {
                  document_type: parsedData.document_type || "", issuer: parsedData.issuer || "",
                  recipient: parsedData.recipient || "", date: parsedData.date || "",
                  total_amount: parsedData.total_amount || 0, items: parsedData.items || [],
                  isAnalyzed: true
                };
                return newList;
              });
            } catch(err) {
              setError(`解析エラー: ${err.message}`);
            } finally {
              setLoading(false);
            }
          };

          // ファイルをBase64に変換するヘルパー
          const readFileAsBase64 = (file) => {
            return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onloadend = () => resolve(reader.result.split(',')[1]);
              reader.onerror = reject;
              reader.readAsDataURL(file);
            });
          };

          // 全件一括解析 (連続処理)
          const analyzeAllImages = async () => {
            if (!userApiKey) return setShowSettings(true);
            setIsAnalyzingAll(true); setError(null);
            let errorOccurred = false;

            for (let i = 0; i < imageFiles.length; i++) {
              if (extractedDataList[i].isAnalyzed) continue; // 解析済みはスキップ
              
              setAnalyzingIndex(i);
              setCurrentFileIndex(i); // 画面も一緒に切り替える

              try {
                const base64Data = await readFileAsBase64(imageFiles[i]);
                const mimeType = imageFiles[i].type;
                const parsedData = await analyzeImageCore(base64Data, mimeType, userApiKey);
                
                setExtractedDataList(prev => {
                  const newList = [...prev];
                  newList[i] = {
                    document_type: parsedData.document_type || "", issuer: parsedData.issuer || "",
                    recipient: parsedData.recipient || "", date: parsedData.date || "",
                    total_amount: parsedData.total_amount || 0, items: parsedData.items || [],
                    isAnalyzed: true
                  };
                  return newList;
                });
                // APIレートリミット対策として2秒待機
                await new Promise(resolve => setTimeout(resolve, 2000)); 
              } catch(err) {
                setError(`[${imageFiles[i].name}] の解析でエラーが発生したため、連続処理を中断しました: ${err.message}`);
                errorOccurred = true;
                break; 
              }
            }
            setIsAnalyzingAll(false);
            setAnalyzingIndex(-1);
            if (!errorOccurred && imageFiles.length > 0) setCurrentFileIndex(0); // 完了したら先頭に戻る
          };

          // --- 編集ハンドラ (現在のインデックスのデータを更新) ---
          const handleInputChange = (field, value) => {
            setExtractedDataList(prev => {
              const newList = [...prev];
              newList[currentFileIndex] = { ...newList[currentFileIndex], [field]: value };
              return newList;
            });
          };

          const handleItemChange = (index, field, value) => {
            setExtractedDataList(prev => {
              const newList = [...prev];
              const newItems = [...newList[currentFileIndex].items];
              newItems[index] = { ...newItems[index], [field]: value };
              newList[currentFileIndex] = { ...newList[currentFileIndex], items: newItems };
              return newList;
            });
          };

          const addItem = () => {
            setExtractedDataList(prev => {
              const newList = [...prev];
              const currentItems = newList[currentFileIndex].items || [];
              newList[currentFileIndex] = {
                ...newList[currentFileIndex],
                items: [...currentItems, { name: "", quantity: 0, unit: "", unit_price: 0, price: 0 }]
              };
              return newList;
            });
          };

          const removeItem = (index) => {
            setExtractedDataList(prev => {
              const newList = [...prev];
              const newItems = [...newList[currentFileIndex].items];
              newItems.splice(index, 1);
              newList[currentFileIndex] = { ...newList[currentFileIndex], items: newItems };
              return newList;
            });
          };

          // --- エクスポート用データ生成共通関数 ---
          const generateCSVContent = () => {
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            let csvContent = "ファイル名,書類種別,発行日,宛先,発行元,合計金額,品名,数量,単位,単価,金額\n";
            
            extractedDataList.forEach((data, index) => {
              const fileName = imageFiles[index] ? imageFiles[index].name : `file_${index+1}`;
              const escapeCSV = (str) => String(str || '').replace(/"/g, '""');
              
              const docType = escapeCSV(data.document_type);
              const date = escapeCSV(data.date);
              const recipient = escapeCSV(data.recipient);
              const issuer = escapeCSV(data.issuer);
              const total = data.total_amount || 0;

              const baseRow = `"${fileName}","${docType}","${date}","${recipient}","${issuer}",${total}`;
              
              if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                  const name = escapeCSV(item.name);
                  const unit = escapeCSV(item.unit);
                  csvContent += `${baseRow},"${name}",${item.quantity || 0},"${unit}",${item.unit_price || 0},${item.price || 0}\n`;
                });
              } else {
                csvContent += `${baseRow},"","",0,"",0,0\n`;
              }
            });
            return { bom, csvContent };
          };

          // --- 一括エクスポート機能 ---
          const exportJSON = () => {
            const exportData = extractedDataList.map((data, index) => {
              const { isAnalyzed, ...rest } = data; // 内部フラグを削除
              return { file_name: imageFiles[index]?.name || `file_${index+1}`, ...rest };
            });
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "extracted_documents_all.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
          };

          const exportCSV = () => {
            const { bom, csvContent } = generateCSVContent();
            const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", url);
            downloadAnchorNode.setAttribute("download", "extracted_documents_all.csv");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
          };

          const exportExcel = () => {
            if (typeof XLSX === 'undefined') {
              setError("Excel生成ライブラリの読み込みに失敗しました。");
              return;
            }
            
            // Excel出力用の二次元配列データを作成
            const aoa = [
              ["ファイル名", "書類種別", "発行日", "宛先", "発行元", "合計金額", "品名", "数量", "単位", "単価", "金額"]
            ];
            
            extractedDataList.forEach((data, index) => {
              const fileName = imageFiles[index] ? imageFiles[index].name : `file_${index+1}`;
              const baseRow = [fileName, data.document_type || "", data.date || "", data.recipient || "", data.issuer || "", data.total_amount || 0];
              
              if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                  aoa.push([...baseRow, item.name || "", item.quantity || 0, item.unit || "", item.unit_price || 0, item.price || 0]);
                });
              } else {
                aoa.push([...baseRow, "", 0, "", 0, 0]);
              }
            });

            const worksheet = XLSX.utils.aoa_to_sheet(aoa);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "抽出データ");
            XLSX.writeFile(workbook, "extracted_documents_all.xlsx");
          };

          const exportPDF = () => {
            // PDF出力（印刷用ウィンドウを開いて印刷させる方式が日本語フォントの文字化けを防ぐため最適）
            const printWindow = window.open('', '_blank');
            if (!printWindow) {
              setError("ポップアップがブロックされました。PDF出力するにはポップアップを許可してください。");
              return;
            }
            
            let html = `
              <!DOCTYPE html>
              <html lang="ja">
              <head>
                <meta charset="UTF-8">
                <title>抽出データ一覧 (PDF用)</title>
                <style>
                  body { font-family: sans-serif; font-size: 11px; padding: 20px; color: #333; }
                  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
                  th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
                  th { background-color: #f8f9fa; font-weight: bold; }
                  .text-right { text-align: right; }
                  @media print {
                    @page { margin: 15mm; size: landscape; }
                  }
                </style>
              </head>
              <body>
                <h2>抽出データ一覧</h2>
                <table>
                  <thead>
                    <tr>
                      <th>ファイル名</th><th>書類種別</th><th>発行日</th><th>宛先</th><th>発行元</th><th>合計金額</th>
                      <th>品名</th><th>数量</th><th>単位</th><th>単価</th><th>金額</th>
                    </tr>
                  </thead>
                  <tbody>
            `;
            
            extractedDataList.forEach((data, index) => {
              const fileName = imageFiles[index] ? imageFiles[index].name : `file_${index+1}`;
              
              if (data.items && data.items.length > 0) {
                data.items.forEach(item => {
                  html += `<tr>
                    <td>${fileName}</td><td>${data.document_type || ''}</td><td>${data.date || ''}</td><td>${data.recipient || ''}</td><td>${data.issuer || ''}</td><td class="text-right">${data.total_amount || 0}</td>
                    <td>${item.name || ''}</td><td class="text-right">${item.quantity || 0}</td><td>${item.unit || ''}</td><td class="text-right">${item.unit_price || 0}</td><td class="text-right">${item.price || 0}</td>
                  </tr>`;
                });
              } else {
                html += `<tr>
                  <td>${fileName}</td><td>${data.document_type || ''}</td><td>${data.date || ''}</td><td>${data.recipient || ''}</td><td>${data.issuer || ''}</td><td class="text-right">${data.total_amount || 0}</td>
                  <td></td><td></td><td></td><td></td><td></td>
                </tr>`;
              }
            });

            html += `
                  </tbody>
                </table>
                <script>
                  window.onload = function() {
                    setTimeout(function() { 
                      window.print(); 
                      // 印刷ダイアログが閉じられたらウィンドウを閉じる（一部ブラウザ用）
                      setTimeout(function() { window.close(); }, 500);
                    }, 500);
                  };
                <\/script>
              </body>
              </html>
            `;
            
            printWindow.document.write(html);
            printWindow.document.close();
          };

          const copyCSVToClipboard = () => {
            const { csvContent } = generateCSVContent();
            try {
              const textArea = document.createElement("textarea");
              textArea.value = csvContent;
              document.body.appendChild(textArea);
              textArea.select();
              document.execCommand("copy");
              textArea.remove();
              
              setToastMessage("CSV形式でクリップボードにコピーしました");
              setTimeout(() => setToastMessage(null), 3000);
            } catch (err) {
              setError("クリップボードへのコピーに失敗しました。");
            }
          };

          const renderResizableHeader = (label, colKey) => (
            <th className="p-2 font-bold relative group" style={{ width: columnWidths[colKey] }}>
              {label}
              <div
                className="absolute right-0 top-0 h-full w-1 cursor-col-resize bg-transparent group-hover:bg-blue-400/50 transition-colors z-10"
                onMouseDown={(e) => startResize(e, colKey)}
              />
            </th>
          );

          // フォームコンテンツの描画
          const renderFormContent = (isOverlay = false) => {
            const inputBase = "w-full p-2 border rounded outline-none transition-colors font-medium ";
            const textInputClass = isOverlay 
              ? inputBase + "border-gray-400/50 bg-white/40 focus:bg-white/90 text-gray-900 placeholder-gray-700/50" 
              : inputBase + "border-gray-300 bg-white focus:ring-2 focus:ring-blue-500 text-gray-800";
            
            const tableInputClass = isOverlay
              ? "w-full p-1.5 border border-transparent bg-white/30 hover:bg-white/50 focus:bg-white/90 rounded outline-none text-gray-900 font-medium"
              : "w-full p-1.5 border border-transparent hover:border-gray-300 focus:border-blue-500 rounded outline-none";

            const labelClass = `block text-xs font-bold mb-1 ${isOverlay ? 'text-gray-800' : 'text-gray-500'}`;

            return (
              <div className={`p-4 md:p-6 space-y-6 ${isOverlay ? '' : 'overflow-y-auto flex-grow'}`}>
                {/* 処理状態のバッジ表示 */}
                {extractedData.isAnalyzed && (
                   <div className="inline-flex items-center gap-1 px-2 py-1 bg-green-100 text-green-800 text-xs font-bold rounded">
                     <FaIcon name="check-circle" /> AI解析完了
                   </div>
                )}
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className={labelClass}>書類種別</label>
                    <input type="text" value={extractedData.document_type} onChange={(e) => handleInputChange('document_type', e.target.value)} className={textInputClass} placeholder="例: 御見積書" />
                  </div>
                  <div>
                    <label className={labelClass}>発行日</label>
                    <input type="text" value={extractedData.date} onChange={(e) => handleInputChange('date', e.target.value)} className={textInputClass} placeholder="202X年X月X日" />
                  </div>
                  <div>
                    <label className={labelClass}>宛先</label>
                    <input type="text" value={extractedData.recipient} onChange={(e) => handleInputChange('recipient', e.target.value)} className={textInputClass} placeholder="株式会社〇〇" />
                  </div>
                  <div>
                    <label className={labelClass}>発行元</label>
                    <input type="text" value={extractedData.issuer} onChange={(e) => handleInputChange('issuer', e.target.value)} className={textInputClass} placeholder="〇〇株式会社" />
                  </div>
                  <div className="md:col-span-2">
                    <label className={labelClass}>合計金額</label>
                    <div className="relative">
                      <span className={`absolute left-3 top-2.5 font-bold ${isOverlay ? 'text-gray-800' : 'text-gray-500'}`}>¥</span>
                      <input type="number" value={extractedData.total_amount} onChange={(e) => handleInputChange('total_amount', Number(e.target.value))} className={`${textInputClass} pl-8 text-lg text-right`} />
                    </div>
                  </div>
                </div>

                <div className="mt-8">
                  <div className="flex justify-between items-center mb-2">
                    <h3 className={`font-bold ${isOverlay ? 'text-gray-900' : 'text-gray-700'}`}>明細項目</h3>
                    <button onClick={addItem} className={`text-sm flex items-center gap-1 font-bold ${isOverlay ? 'text-blue-800 hover:text-blue-900' : 'text-blue-600 hover:text-blue-800'}`}>
                      <FaIcon name="plus" size={14} /> 行を追加
                    </button>
                  </div>
                  <div className={`overflow-x-auto border rounded-lg ${isOverlay ? 'border-gray-400/50 bg-white/20' : 'border-gray-200'}`}>
                    <table className="w-full text-sm text-left table-fixed">
                      <thead className={`border-b ${isOverlay ? 'border-gray-400/50 text-gray-900 bg-white/40' : 'bg-gray-50 border-gray-200 text-gray-600'}`}>
                        <tr>
                          {renderResizableHeader('品名', 'name')}
                          {renderResizableHeader('数量', 'quantity')}
                          {renderResizableHeader('単位', 'unit')}
                          {renderResizableHeader('単価', 'unit_price')}
                          {renderResizableHeader('金額', 'price')}
                          <th className="p-2 w-10 text-center" style={{ width: columnWidths.action }}></th>
                        </tr>
                      </thead>
                      <tbody className={`divide-y ${isOverlay ? 'divide-gray-400/30' : 'divide-gray-100'}`}>
                        {extractedData.items.map((item, index) => (
                          <tr key={index} className={isOverlay ? 'hover:bg-white/30' : 'hover:bg-gray-50'}>
                            <td className="p-1"><input type="text" value={item.name} onChange={(e) => handleItemChange(index, 'name', e.target.value)} className={tableInputClass} /></td>
                            <td className="p-1"><input type="number" value={item.quantity} onChange={(e) => handleItemChange(index, 'quantity', Number(e.target.value))} className={`${tableInputClass} text-right`} /></td>
                            <td className="p-1"><input type="text" value={item.unit} onChange={(e) => handleItemChange(index, 'unit', e.target.value)} className={`${tableInputClass} text-center`} /></td>
                            <td className="p-1"><input type="number" value={item.unit_price} onChange={(e) => handleItemChange(index, 'unit_price', Number(e.target.value))} className={`${tableInputClass} text-right`} /></td>
                            <td className="p-1"><input type="number" value={item.price} onChange={(e) => handleItemChange(index, 'price', Number(e.target.value))} className={`${tableInputClass} text-right font-bold`} /></td>
                            <td className="p-1 text-center">
                              <button onClick={() => removeItem(index)} className="p-1.5 text-red-500 hover:bg-red-100/50 rounded" title="行を削除">
                                <FaIcon name="trash" size={14} />
                              </button>
                            </td>
                          </tr>
                        ))}
                        {extractedData.items.length === 0 && (
                          <tr><td colSpan="6" className="p-8 text-center text-gray-500 font-bold">明細データがありません</td></tr>
                        )}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-gray-50 text-gray-800 p-4 md:p-8 relative"
              onMouseMove={resizeState ? onResize : null}
              onMouseUp={resizeState ? endResize : null}
              onMouseLeave={resizeState ? endResize : null}
            >
              {/* トースト通知 */}
              {toastMessage && (
                <div className="fixed top-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-lg shadow-2xl z-50 flex items-center gap-3 transition-all animate-fade-in-down">
                  <FaIcon name="circle-check" className="text-green-400" size={20} />
                  <span className="font-medium">{toastMessage}</span>
                </div>
              )}

              <div className="max-w-7xl mx-auto">
                <header className="mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-gray-200 pb-4">
                  <div>
                    <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-2">
                      <FaIcon name="file-excel" className="text-blue-600" size={24} />
                      AI DocuExtract
                    </h1>
                  </div>
                  <div className="flex items-center gap-4">
                    {/* 表示モードトグル */}
                    <div className="flex bg-gray-200 p-1 rounded-lg">
                      <button
                        onClick={() => setViewMode('split')}
                        className={`px-3 py-1.5 rounded-md flex items-center gap-2 text-sm font-medium transition-all ${viewMode === 'split' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                      >
                        <FaIcon name="table-columns" size={16} /> 分割ビュー
                      </button>
                      <button
                        onClick={() => setViewMode('overlay')}
                        className={`px-3 py-1.5 rounded-md flex items-center gap-2 text-sm font-medium transition-all ${viewMode === 'overlay' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}
                      >
                        <FaIcon name="layer-group" size={16} /> 透過レビュー
                      </button>
                    </div>
                    
                    <div className="h-6 w-px bg-gray-300"></div>

                    <button onClick={() => setShowSettings(true)} className="flex items-center gap-2 px-3 py-1.5 text-sm bg-gray-100 border border-gray-300 rounded-lg hover:bg-gray-200 transition-colors text-gray-700">
                      <FaIcon name="gear" size={16} /> API設定
                    </button>

                    {/* エクスポートメニュー（プルダウン） */}
                    <div className="relative" ref={exportMenuRef}>
                      <button 
                        onClick={() => setIsExportMenuOpen(!isExportMenuOpen)} 
                        disabled={imageFiles.length === 0}
                        className="flex items-center gap-2 px-4 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 font-bold shadow-sm transition-colors"
                      >
                        <FaIcon name="download" size={16} /> 
                        保存・出力
                        <FaIcon name="chevron-down" size={12} className={`transition-transform duration-200 ${isExportMenuOpen ? 'rotate-180' : ''}`} />
                      </button>

                      {isExportMenuOpen && (
                        <div className="absolute right-0 mt-2 w-64 bg-white rounded-xl shadow-2xl border border-gray-200 overflow-hidden z-50">
                          <div className="py-1">
                            <button onClick={() => { exportCSV(); setIsExportMenuOpen(false); }} className="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-3 transition-colors">
                              <FaIcon name="file-csv" className="text-gray-500 w-5 text-center" size={18} />
                              <div>
                                <div className="font-bold">CSV形式で保存</div>
                                <div className="text-xs text-gray-500 mt-0.5">表計算ソフトで編集可能</div>
                              </div>
                            </button>
                            <button onClick={() => { exportExcel(); setIsExportMenuOpen(false); }} className="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-3 transition-colors border-t border-gray-100">
                              <FaIcon name="file-excel" className="text-green-600 w-5 text-center" size={18} />
                              <div>
                                <div className="font-bold text-green-700">Excel形式で保存</div>
                                <div className="text-xs text-gray-500 mt-0.5">.xlsxファイルとして保存</div>
                              </div>
                            </button>
                            <button onClick={() => { exportPDF(); setIsExportMenuOpen(false); }} className="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-3 transition-colors border-t border-gray-100">
                              <FaIcon name="file-pdf" className="text-red-500 w-5 text-center" size={18} />
                              <div>
                                <div className="font-bold text-red-600">PDF形式で保存</div>
                                <div className="text-xs text-gray-500 mt-0.5">印刷・配布用に最適</div>
                              </div>
                            </button>
                            <button onClick={() => { exportJSON(); setIsExportMenuOpen(false); }} className="w-full text-left px-4 py-3 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-3 transition-colors border-t border-gray-100">
                              <FaIcon name="file-code" className="text-gray-500 w-5 text-center" size={18} />
                              <div>
                                <div className="font-bold">JSON形式で保存</div>
                                <div className="text-xs text-gray-500 mt-0.5">システム連携用データ</div>
                              </div>
                            </button>
                            <div className="bg-gray-50 p-3 border-t border-gray-200">
                              <button onClick={() => { copyCSVToClipboard(); setIsExportMenuOpen(false); }} className="w-full text-left px-3 py-2.5 text-sm text-blue-600 bg-white border border-blue-200 hover:bg-blue-50 hover:border-blue-300 rounded-lg flex items-center justify-center gap-2 transition-colors font-bold shadow-sm">
                                <FaIcon name="copy" /> CSVをクリップボードにコピー
                              </button>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </header>

                {error && (
                  <div className="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 flex items-center gap-3 rounded text-sm">
                    <FaIcon name="circle-exclamation" size={18} /> <p>{error}</p>
                  </div>
                )}

                {/* コントロールバー（複数ファイル対応） */}
                <div className="mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-wrap justify-between items-center gap-4">
                  <div className="flex flex-wrap items-center gap-4">
                    <input type="file" multiple accept="image/*" onChange={handleImageUpload} ref={fileInputRef} className="hidden" />
                    <button onClick={() => fileInputRef.current?.click()} className="flex items-center gap-2 px-4 py-2 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200 transition-colors font-medium text-gray-700">
                      <FaIcon name="upload" size={16} /> {imageFiles.length > 0 ? `${imageFiles.length}枚の画像を選択中` : '画像を選択(複数可)'}
                    </button>

                    {/* ファイルナビゲーション */}
                    {imageFiles.length > 0 && (
                      <div className="flex items-center gap-3 bg-gray-50 border border-gray-200 p-1.5 rounded-lg">
                        <button 
                          disabled={currentFileIndex === 0 || isAnalyzingAll} 
                          onClick={() => setCurrentFileIndex(i => i - 1)} 
                          className="p-1.5 text-gray-500 hover:text-gray-800 hover:bg-gray-200 rounded disabled:opacity-30 disabled:hover:bg-transparent"
                        ><FaIcon name="chevron-left" /></button>
                        
                        <div className="text-sm font-medium w-32 text-center flex flex-col items-center">
                          <span className="text-gray-700">{currentFileIndex + 1} / {imageFiles.length}</span>
                          <span className="text-xs text-gray-400 truncate w-full" title={imageFiles[currentFileIndex].name}>
                            {imageFiles[currentFileIndex].name}
                          </span>
                        </div>
                        
                        <button 
                          disabled={currentFileIndex === imageFiles.length - 1 || isAnalyzingAll} 
                          onClick={() => setCurrentFileIndex(i => i + 1)} 
                          className="p-1.5 text-gray-500 hover:text-gray-800 hover:bg-gray-200 rounded disabled:opacity-30 disabled:hover:bg-transparent"
                        ><FaIcon name="chevron-right" /></button>
                      </div>
                    )}
                  </div>

                  {/* 解析アクションボタン */}
                  <div className="flex gap-2">
                    <button onClick={analyzeCurrentImage} disabled={!imageSrc || loading || isAnalyzingAll || !userApiKey} className="flex items-center gap-2 px-4 py-2 bg-white border border-blue-600 text-blue-600 rounded-md hover:bg-blue-50 disabled:opacity-50 font-bold transition-colors">
                      {loading && !isAnalyzingAll ? <FaIcon name="spinner" size={16} className="fa-spin" /> : <FaIcon name="play" size={16} />}
                      表示中を処理
                    </button>
                    {imageFiles.length > 1 && (
                      <button onClick={analyzeAllImages} disabled={!imageSrc || loading || isAnalyzingAll || !userApiKey} className="flex items-center gap-2 px-5 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-80 font-bold transition-colors shadow-sm">
                        {isAnalyzingAll ? <FaIcon name="spinner" size={16} className="fa-spin" /> : <FaIcon name="forward-fast" size={16} />}
                        {isAnalyzingAll ? `全件処理中(${analyzingIndex + 1}/${imageFiles.length})` : '未処理をすべて実行'}
                      </button>
                    )}
                  </div>
                </div>

                {/* APIキー設定モーダル */}
                {showSettings && (
                  <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden">
                      <div className="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                        <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                          <FaIcon name="key" className="text-blue-600" size={20} />
                          Gemini API設定
                        </h2>
                        <button onClick={() => setShowSettings(false)} className="text-gray-500 hover:text-gray-700">
                          <FaIcon name="xmark" size={20} />
                        </button>
                      </div>
                      <div className="p-6">
                        <p className="text-sm text-gray-600 mb-4">
                          このアプリを使用するには、Google AI Studioで取得したAPIキーが必要です。キーはブラウザにのみ保存され、外部のサーバーには送信されません。
                        </p>
                        <div className="mb-4">
                          <label className="block text-sm font-bold text-gray-700 mb-2">APIキー</label>
                          <input
                            type="password"
                            value={apiKeyInput}
                            onChange={(e) => setApiKeyInput(e.target.value)}
                            placeholder="AIzaSy..."
                            className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                          />
                        </div>
                        <div className="flex justify-end gap-2 mt-6">
                          <button onClick={() => setShowSettings(false)} className="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200">
                            キャンセル
                          </button>
                          <button onClick={saveApiKey} className="px-4 py-2 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700">
                            保存して閉じる
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* メインビューエリア */}
                {viewMode === 'split' ? (
                  /* --- 分割ビュー --- */
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[calc(100vh-16rem)] min-h-[600px]">
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                      <div className="p-3 border-b border-gray-200 bg-gray-50 font-semibold text-gray-700 flex items-center gap-2">
                        <FaIcon name="image" size={16} /> 元画像
                      </div>
                      <div className="flex-grow p-4 overflow-auto bg-gray-100 flex justify-center">
                        {imageSrc ? <img src={imageSrc} alt="Preview" className="max-w-full h-auto object-contain" /> : <p className="text-gray-400 mt-10">画像がありません</p>}
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col overflow-hidden">
                      <div className="p-3 border-b border-gray-200 bg-gray-50 font-semibold text-gray-700 flex items-center gap-2">
                        <FaIcon name="file-excel" size={16} /> 抽出データ
                      </div>
                      {renderFormContent(false)}
                    </div>
                  </div>
                ) : (
                  /* --- 透過オーバーレイビュー --- */
                  <div className="relative w-full h-[calc(100vh-16rem)] min-h-[700px] border border-gray-300 rounded-xl overflow-hidden bg-gray-200 shadow-inner">
                    <div className="w-full h-full overflow-auto p-4 md:p-8">
                      {imageSrc ? (
                        <img src={imageSrc} alt="Preview" className="min-w-[800px] w-full h-auto shadow-md" />
                      ) : (
                        <div className="flex justify-center items-center h-full text-gray-400"><p>画像を選択してください</p></div>
                      )}
                    </div>

                    <div 
                      ref={panelRef}
                      style={{ 
                        left: panelPos.x, top: panelPos.y,
                        width: panelSize.width, height: panelSize.height,
                        backgroundColor: `rgba(255, 255, 255, ${panelOpacity})`,
                        backdropFilter: 'blur(4px)'
                      }}
                      className={`absolute shadow-2xl rounded-xl flex flex-col border border-gray-300/50 transition-opacity ${isDragging ? 'opacity-90' : ''} ${resizeState ? '' : 'transition-all'}`}
                    >
                      <div onMouseDown={startDrag} className="cursor-move p-3 border-b border-gray-300/30 flex justify-between items-center bg-gray-200/50 rounded-t-xl hover:bg-gray-200/80 transition-colors">
                        <div className="flex items-center gap-2 font-bold text-gray-800">
                          <FaIcon name="grip-lines" size={16} className="text-gray-500" />
                          データ編集パネル
                        </div>
                        <div className="flex items-center gap-3 text-sm font-medium bg-white/50 px-3 py-1 rounded-full shadow-sm" onMouseDown={e => e.stopPropagation()}>
                          <span className="text-gray-700">透明度</span>
                          <input type="range" min="0.1" max="1" step="0.05" value={panelOpacity} onChange={e => setPanelOpacity(parseFloat(e.target.value))} className="w-24 accent-blue-600" />
                        </div>
                      </div>

                      <div className="flex-grow overflow-y-auto relative">
                        {renderFormContent(true)}
                      </div>

                      <div className="absolute right-0 bottom-0 w-4 h-4 cursor-se-resize z-20" onMouseDown={(e) => startResize(e, 'panel-se')} ></div>
                      <div className="absolute right-0 top-0 w-1 h-full cursor-e-resize z-20" onMouseDown={(e) => startResize(e, 'panel-e')} ></div>
                      <div className="absolute left-0 bottom-0 w-full h-1 cursor-s-resize z-20" onMouseDown={(e) => startResize(e, 'panel-s')} ></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
